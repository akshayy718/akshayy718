name: Generate Snake Animation

on:
  # Runs automatically every 12 hours
  schedule:
    - cron: "0 */12 * * *"

  # Lets you run it manually from the Actions tab anytime
  workflow_dispatch:

  # Also runs whenever you push to main
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      # Step 1: Check out your repo
      - name: Checkout repository
        uses: actions/checkout@v3

      # Step 2: Generate the snake SVG from your contribution graph
      - name: Generate snake animation
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: akshayy718
          outputs: |
            dist/github-snake.svg
            dist/github-snake-dark.svg?palette=github-dark

      # Step 3: Push the generated SVG files to the "output" branch
      - name: Push snake to output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
